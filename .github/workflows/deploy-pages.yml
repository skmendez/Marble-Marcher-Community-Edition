name: Deploy Pages

on:
  push:
    branches: [master]
    paths:
      - "rust/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; a newer push supersedes an in-flight one.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (+ wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build (wasm32, WebGPU, release)
        working-directory: rust
        run: cargo build -p marble-marcher-bevy --target wasm32-unknown-unknown --features web --release

      # wasm-bindgen-cli's version must match the `wasm-bindgen` crate version
      # locked in Cargo.lock (mismatches fail at bindgen time), so read it
      # from the lockfile instead of hardcoding a version here.
      - name: Determine required wasm-bindgen-cli version
        id: wbg
        working-directory: rust
        run: |
          version=$(grep -A1 '^name = "wasm-bindgen"$' Cargo.lock | grep '^version' | head -1 | sed -E 's/.*"(.*)".*/\1/')
          echo "Locked wasm-bindgen version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache wasm-bindgen-cli
        id: cache-wbg-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-bindgen
          key: wasm-bindgen-cli-${{ steps.wbg.outputs.version }}-${{ runner.os }}

      - name: Install wasm-bindgen-cli
        if: steps.cache-wbg-cli.outputs.cache-hit != 'true'
        run: cargo install wasm-bindgen-cli --version ${{ steps.wbg.outputs.version }}

      - name: Generate JS bindings and assemble site
        run: |
          mkdir -p dist
          cp rust/web/index.html dist/
          cp rust/web/net.js dist/
          # Image assets (e.g. the marble's cubemap texture): Bevy's
          # AssetPlugin fetches these via HTTP relative to the served page
          # on wasm, they are not bundled into the wasm binary by cargo --
          # `rust/app/assets/` is the source of truth, native builds find it
          # directly, this copy is what makes it reachable on the deployed
          # site at all.
          cp -r rust/app/assets dist/assets
          wasm-bindgen --no-typescript --target web \
            --out-dir dist --out-name marble-marcher \
            rust/target/wasm32-unknown-unknown/release/marble-marcher-bevy.wasm

      # Pin an exact binaryen release rather than `apt-get install binaryen`:
      # Ubuntu noble's apt candidate (108-1 as of this writing) would likely
      # work too, but pinning the same build we validated locally (size
      # numbers + an actual in-browser CDP screenshot check) avoids silent
      # drift if a future apt upgrade changes wasm-opt's output.
      - name: Install wasm-opt (binaryen, pinned release)
        run: |
          curl -sL -o /tmp/binaryen.tar.gz \
            https://github.com/WebAssembly/binaryen/releases/download/version_120/binaryen-version_120-x86_64-linux.tar.gz
          tar -xzf /tmp/binaryen.tar.gz -C /tmp
          echo "/tmp/binaryen-version_120/bin" >> "$GITHUB_PATH"

      - name: Verify wasm-opt is installed
        run: wasm-opt --version

      # -Oz over -O3: this app is GPU/shader-bound (ray marching runs in the
      # WGSL fragment shader, not in wasm), so binary size/load time matter
      # far more than wasm execution speed. Measured locally: -Oz produced
      # an 8% smaller module than -O3 while running an order of magnitude
      # faster. The --enable-* flags mirror the wasm32-unknown-unknown
      # target's default feature set (confirmed by bisecting wasm-opt's
      # validator errors against the wasm-bindgen output) — rustc no longer
      # embeds a target-features custom section wasm-opt could otherwise
      # autodetect from, so they must be passed explicitly.
      - name: Optimize wasm with wasm-opt (-Oz, size-focused)
        run: |
          wasm-opt -Oz \
            --enable-bulk-memory \
            --enable-nontrapping-float-to-int \
            --enable-sign-ext \
            --enable-mutable-globals \
            dist/marble-marcher_bg.wasm -o dist/marble-marcher_bg.wasm.opt
          mv dist/marble-marcher_bg.wasm.opt dist/marble-marcher_bg.wasm
          ls -la dist/marble-marcher_bg.wasm

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
