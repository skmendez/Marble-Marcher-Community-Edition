<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- Without this, mobile browsers render at a virtual desktop-width
       viewport (~980px) and scale it down, and still allow native
       pinch-zoom -- both fight the app's own touch gesture handling
       (touch.rs), which expects real device pixel coordinates and owns
       pinch/swipe/rotate itself (DESIGN.md's mobile touch controls work). -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Marble Marcher CSG (Bevy/WebGPU)</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; }
    /* `touch-action: none` stops the browser from treating a swipe/pinch on
       the canvas as native page-pan/zoom before our own touch handlers
       (touch.rs's touch_camera_input / physics_sys.rs's pinch read) ever see
       a clean gesture -- standard practice for a canvas-based touch app,
       independent of (and layered on top of) the separate render-freeze
       regression fixed in present.rs/mrrm.rs this same pass, which turned
       out to be the actual cause of a same-session "swipe does nothing"
       report. */
    canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
    /* Our own dat.gui container (see setUpConfigPanel's autoPlace: false):
       pinned bottom-right and clamped to the viewport with its own scroll,
       so the panel can never render taller than the screen with its bottom
       rows (previously the live toggles + close button) cut off -- the
       exact failure seen on phones with dat.gui's own positioning. */
    #config-gui {
      position: fixed;
      bottom: 6px;
      right: 6px;
      z-index: 1000;
      max-height: 70vh;
      overflow-y: auto;
      overscroll-behavior: contain;
    }
    /* Checkbox/row hit targets are desktop-mouse-sized by default; give
       coarse (touch) pointers slightly bigger ones. */
    @media (pointer: coarse) {
      #config-gui .dg .c input[type="checkbox"] {
        width: 20px;
        height: 20px;
      }
    }
  </style>
</head>
<body>
  <!-- Multiplayer milestone 2: PeerJS wraps browser WebRTC + a free public
       signaling broker (0.peerjs.com by default) so two static-hosted
       clients can establish a peer-to-peer data channel without this repo
       running any server-side code of its own -- see net.js, which is the
       only thing that talks to the `Peer`/`DataConnection` objects this
       script defines; rust/app/src/net.rs only ever calls net.js's narrow
       poll-based API. Loaded from a CDN (unpkg) rather than vendored, so
       this is a real runtime dependency on that CDN and on 0.peerjs.com's
       broker being reachable -- both are only needed to *establish* a
       connection, not for gameplay traffic once connected. -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="./net.js"></script>
  <!-- Debug/config panel: a dat.gui control per existing `?key=value` toggle
       (see rust/app/src/config.rs's `Config::from_env` -- this table must
       stay in sync with that function's flags, encodings, and defaults by
       hand, since there's no shared source of truth across the wasm
       boundary). Deliberately reload-on-change, not a live in-place update:
       every flag here is only ever read once, at startup
       (`Config::from_env`), so a reload is what actually applies a change
       regardless of which flag it is -- no need to special-case flags that
       "happen to" get re-read every frame vs. ones that don't. This is
       purely a faster alternative to hand-editing the URL; every link built
       by editing `?key=value` directly (shared links, this project's CDP
       test scripts) is completely unaffected. -->
  <script src="https://unpkg.com/dat.gui@0.7.9/build/dat.gui.min.js"></script>
  <script>
    (function setUpConfigPanel() {
      const params = new URLSearchParams(location.search);

      // One entry per `Config::from_env` flag. `key`: the query-param name.
      // `type`: 'bool' (dat.gui checkbox) or 'enum' (dat.gui dropdown).
      // `parse`: query string -> current JS value, mirroring that flag's
      // exact default/encoding in config.rs. `serialize`: JS value -> query
      // string value to write back (only present where it differs from
      // `String(value)`, e.g. a bool that encodes as "0"/"1" rather than
      // "false"/"true"). `options`: dropdown choices for 'enum' fields
      // (`SceneKind::from_value`'s exact accepted strings, render.rs).
      //
      // `mrrm` and `stepheat` are NOT here: they moved to the live (no
      // reload) panel below (`live_debug.rs`'s `LiveDebugToggles`) since
      // debugging MRRM's coarse-warm-start behavior needs to flip these
      // mid-session without losing camera position. Every other flag stays
      // reload-based -- see this panel's own doc just above.
      const FIELDS = [
        {
          key: "scene",
          type: "enum",
          options: ["menger_oscillating_sphere", "demo", "classic_only", "menger_sponge", "menger_sphere", "hollow_donut"],
          parse: (v) => (v === null ? "menger_oscillating_sphere" : v),
        },
        {
          key: "shadowlod",
          type: "bool",
          parse: (v) => v !== "0", // default on
          serialize: (v) => (v ? "1" : "0"),
        },
        {
          key: "perfprobe",
          type: "bool",
          parse: (v) => v === "1" || v === "true", // default off
          serialize: (v) => (v ? "1" : "0"),
        },
        {
          key: "debug",
          type: "bool",
          parse: (v) => v === "1", // default off
          serialize: (v) => (v ? "1" : "0"),
        },
        {
          key: "vsync",
          type: "bool",
          // Config's own field is `vsync_off` (true means vsync is OFF), but
          // the panel shows the checkbox as "vsync" (checked = vsync ON, the
          // default) so its polarity matches every other checkbox here
          // (checked = feature enabled) instead of a double-negative.
          parse: (v) => v !== "off",
          serialize: (v) => (v ? "on" : "off"), // any non-"off" value falls back to AutoVsync (main.rs's present_mode), "on" is just the readable choice
        },
        {
          key: "res_oscillate",
          type: "bool",
          parse: (v) => v === "1", // default off
          serialize: (v) => (v ? "1" : "0"),
        },
        {
          key: "gpuprofile",
          type: "bool",
          parse: (v) => v === "1", // default off
          serialize: (v) => (v ? "1" : "0"),
        },
      ];

      const state = {};
      for (const field of FIELDS) {
        state[field.key] = field.parse(params.get(field.key));
      }

      function applyChange() {
        const next = new URLSearchParams(location.search);
        for (const field of FIELDS) {
          const value = state[field.key];
          const serialized = field.serialize ? field.serialize(value) : String(value);
          next.set(field.key, serialized);
        }
        // Assigning `location.search` navigates on its own (confirmed) --
        // no separate `location.reload()` call needed.
        location.search = next.toString();
      }

      // `autoPlace: false` + our own `#config-gui` container (styled in the
      // <head>): dat.gui's auto-placed container is fixed top-right with its
      // own inline sizing, and the previous approach of restyling
      // `gui.domElement` *inside* that container rendered mispositioned and
      // bottom-clipped on phones (the last rows and close button off-screen).
      // Owning the container makes the position/max-height/scroll behavior
      // one plain CSS rule instead of a fight with dat.gui's internals.
      const gui = new dat.GUI({ autoPlace: false });
      const guiContainer = document.createElement("div");
      guiContainer.id = "config-gui";
      guiContainer.appendChild(gui.domElement);
      document.body.appendChild(guiContainer);
      // Phones: start collapsed so the panel doesn't dominate a small
      // screen at load -- one tap on "Open Controls" brings it back.
      // Desktop keeps it open, matching previous behavior.
      if (window.innerWidth < 700) {
        gui.close();
      }

      // Copy-invite-link, moved here from the old in-canvas Bevy button
      // (net.rs's spawn_net_ui used to draw its own top-right link text +
      // button): the invite URL is plain JS state (`mmNet.hostedId()`), so
      // the controls panel can own the whole flow -- build the link, write
      // the clipboard (synchronously inside the click handler, the same
      // user-gesture requirement net.js's copyToClipboard documents), and
      // show transient feedback by renaming the row.
      const COPY_IDLE_LABEL = "copy invite link";
      const copyState = {
        copy: function () {
          const id = window.mmNet.hostedId();
          if (!id) {
            showCopyFeedback("link not ready yet...");
            return;
          }
          const link = `${location.origin}${location.pathname}?join=${id}`;
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(link).then(
              () => showCopyFeedback("copied!"),
              () => showCopyFeedback("copy failed"),
            );
          } else {
            showCopyFeedback("copy failed");
          }
        },
      };
      const copyController = gui.add(copyState, "copy").name(COPY_IDLE_LABEL);
      let copyFeedbackTimeout = null;
      function showCopyFeedback(message) {
        copyController.name(message);
        if (copyFeedbackTimeout !== null) clearTimeout(copyFeedbackTimeout);
        copyFeedbackTimeout = setTimeout(() => {
          copyController.name(COPY_IDLE_LABEL);
          copyFeedbackTimeout = null;
        }, 1500);
      }

      for (const field of FIELDS) {
        const controller =
          field.type === "enum" ? gui.add(state, field.key, field.options) : gui.add(state, field.key);
        controller.onFinishChange(applyChange);
      }

      // Live (no-reload) debug toggles (`live_debug.rs`'s
      // `LiveDebugToggles`) -- added to the same dat.gui panel as the
      // reload-based flags above, but deliberately with no
      // `onFinishChange`/`applyChange` wiring: `window.mmLiveDebug` is a
      // plain object dat.gui mutates in place, polled fresh every frame by
      // Rust (`net.rs`'s `js_bridge::live_mrrm_enabled`/`live_view_mode`),
      // so a change here takes effect on the very next frame with no
      // navigation at all. Seeded once from the same query params so a
      // shared `?mrrm=0`/`?stepheat=1` link still opens in the expected
      // state.
      window.mmLiveDebug = {
        mrrm: params.get("mrrm") !== "0", // absent/anything-but-"0" => on (default on)
        viewMode: params.get("stepheat") === "1" ? 1 : 0, // legacy ?stepheat=1 seeds FineStepHeat
      };
      // Object-mapped dropdown (dat.gui's `gui.add(obj, key, {label: value})`
      // form): values are `live_debug.rs`'s `DebugViewMode::as_uniform_value`
      // wire encoding exactly (0..=3) -- keep in sync if that enum grows.
      const VIEW_MODE_OPTIONS = {
        Off: 0,
        "Fine step heat": 1,
        "Coarse step heat": 2,
        "Coarse step distance": 3,
      };
      gui.add(window.mmLiveDebug, "mrrm").name("mrrm (live)");
      gui.add(window.mmLiveDebug, "viewMode", VIEW_MODE_OPTIONS).name("view mode (live)");

      // Polled every frame from Rust (`net.rs`'s `js_bridge`) -- getters,
      // not pushes, unlike every other `window.mmNet.*` assignment in this
      // file (`reportPassTimings`/`reportStepData` below), since this is
      // Rust pulling current JS state rather than JS pushing a computed
      // result to Rust.
      window.mmNet.liveMrrmEnabled = () => window.mmLiveDebug.mrrm;
      window.mmNet.liveViewMode = () => window.mmLiveDebug.viewMode;
    })();
  </script>
  <!-- GPU per-pass timestamp profiling overlay (gpu_profile.rs). Only
       created when `?gpuprofile=1` is present (mirrors the config panel's
       own `parse` convention for this flag above) -- zero DOM cost
       otherwise. `window.mmNet.reportPassTimings` is called once per frame
       from Rust via net.rs's `js_bridge` once profiling is active there
       too (both sides gate independently on the same flag, by design --
       neither depends on the other having read it first). Positioned
       bottom-left: bottom-right is the config panel above, top-left is
       the Bevy-UI debug overlay (fps_overlay.rs, `?debug=1`), top-right is
       the networking status panel (net.rs's spawn_net_ui -- hidden except
       on connect/disconnect/error events). -->
  <script>
    (function setUpGpuProfileOverlay() {
      const params = new URLSearchParams(location.search);
      if (params.get("gpuprofile") !== "1") return;

      const panel = document.createElement("pre");
      panel.style.position = "fixed";
      panel.style.bottom = "6px";
      panel.style.left = "6px";
      panel.style.margin = "0";
      panel.style.padding = "6px 10px";
      panel.style.background = "rgba(0, 0, 0, 0.55)";
      panel.style.color = "#9cf";
      panel.style.font = "12px/1.4 monospace";
      panel.style.whiteSpace = "pre";
      panel.style.zIndex = "999";
      document.body.appendChild(panel);

      // `ms < 0` is the "no reading yet" sentinel (net.rs's js_bridge doc) --
      // distinct from `supported === false`, which means this adapter will
      // never produce real numbers here at all.
      const fmt = (ms) => (ms < 0 ? "  --  " : ms.toFixed(2).padStart(6) + "ms");

      // Cumulative ray-march step-count estimate (`step_data.rs`) -- a
      // separate `reportStepData` call, independent of `reportPassTimings`
      // above (both gate on the same `?gpuprofile=1` flag on the Rust side,
      // but neither depends on the other having landed first, so this
      // panel tracks each one's own "no reading yet" state separately
      // rather than assuming they arrive together).
      let lastTimingsLine = "GPU pass timings: waiting for first frame...";
      let lastStepDataLine = "step count: waiting for first frame...";
      const render = () => {
        panel.textContent = `${lastTimingsLine}\n${lastStepDataLine}`;
      };
      render();

      window.mmNet.reportPassTimings = function (supported, coarseMs, shadowMs, fineMs, presentMs) {
        if (!supported) {
          lastTimingsLine = "GPU pass timings: unsupported on this backend (no wgpu::Features::TIMESTAMP_QUERY)";
        } else {
          lastTimingsLine =
            "GPU pass timings\n" +
            `  coarse:  ${fmt(coarseMs)}\n` +
            `  shadow:  ${fmt(shadowMs)}\n` +
            `  fine:    ${fmt(fineMs)}\n` +
            `  present: ${fmt(presentMs)}`;
        }
        render();
      };

      window.mmNet.reportStepData = function (avgItersPerPx, estimatedTotalSteps) {
        lastStepDataLine =
          avgItersPerPx < 0
            ? "step count: waiting for first frame..."
            : `est. total steps: ${Math.round(estimatedTotalSteps).toLocaleString()}  (avg ${avgItersPerPx.toFixed(1)}/px)`;
        render();
      };
    })();
  </script>
  <script type="module">
    import init from "./marble-marcher.js";
    init().catch((e) => {
      document.title = "INIT FAILED";
      console.error(e);
    });
  </script>
</body>
</html>
