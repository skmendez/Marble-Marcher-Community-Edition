<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- Without this, mobile browsers render at a virtual desktop-width
       viewport (~980px) and scale it down, and still allow native
       pinch-zoom -- both fight the app's own touch gesture handling
       (touch.rs), which expects real device pixel coordinates and owns
       pinch/swipe/rotate itself (DESIGN.md's mobile touch controls work). -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Marble Marcher CSG (Bevy/WebGPU)</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; }
    /* `touch-action: none` stops the browser from treating a swipe/pinch on
       the canvas as native page-pan/zoom before our own touch handlers
       (touch.rs's touch_camera_input / physics_sys.rs's pinch read) ever see
       a clean gesture -- standard practice for a canvas-based touch app,
       independent of (and layered on top of) the separate render-freeze
       regression fixed in present.rs/mrrm.rs this same pass, which turned
       out to be the actual cause of a same-session "swipe does nothing"
       report. */
    canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
    /* Our own dat.gui container (see setUpConfigPanel's autoPlace: false):
       pinned bottom-right and clamped to the viewport with its own scroll,
       so the panel can never render taller than the screen with its bottom
       rows (previously the live toggles + close button) cut off -- the
       exact failure seen on phones with dat.gui's own positioning. */
    #config-gui {
      position: fixed;
      bottom: 6px;
      right: 6px;
      z-index: 1000;
      max-height: 70vh;
      overflow-y: auto;
      overscroll-behavior: contain;
    }
    /* Checkbox/row hit targets are desktop-mouse-sized by default; give
       coarse (touch) pointers slightly bigger ones. */
    @media (pointer: coarse) {
      #config-gui .dg .c input[type="checkbox"] {
        width: 20px;
        height: 20px;
      }
    }
    /* GPU profiling overlay (see setUpGpuProfileOverlay below): styled to
       read as part of the same developer HUD as the dat.gui controls panel
       (dark semi-transparent backing, monospace, rounded corners) rather
       than a visually distinct floating text block. */
    #gpu-profile-overlay {
      position: fixed;
      bottom: 6px;
      left: 6px;
      margin: 0;
      padding: 6px 10px;
      background: rgba(0, 0, 0, 0.55);
      color: #9cf;
      font: 12px/1.4 monospace;
      white-space: pre;
      border-radius: 3px;
      z-index: 999;
    }
  </style>
</head>
<body>
  <!-- Multiplayer milestone 2: PeerJS wraps browser WebRTC + a free public
       signaling broker (0.peerjs.com by default) so two static-hosted
       clients can establish a peer-to-peer data channel without this repo
       running any server-side code of its own -- see net.js, which is the
       only thing that talks to the `Peer`/`DataConnection` objects this
       script defines; rust/app/src/net.rs only ever calls net.js's narrow
       poll-based API. Loaded from a CDN (unpkg) rather than vendored, so
       this is a real runtime dependency on that CDN and on 0.peerjs.com's
       broker being reachable -- both are only needed to *establish* a
       connection, not for gameplay traffic once connected. -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="./net.js"></script>
  <!-- Always-run JS bridge state: two independent groups of
       `window.mmNet.*` assignments that Rust calls through plain
       `extern "C"` bindings (`net.rs`'s `js_bridge`) with no `catch` and no
       fallback -- if any of these aren't real functions by the time Rust
       calls them, the call throws and breaks the game for every player.
       Neither group is gated on `?debug=1` (or any other flag): both must
       run unconditionally, on every page load, before the debug-gated
       dat.gui folders/GPU-profiling panel below ever get a chance to run
       or fail to run.
         1. `window.mmLiveDebug` (the plain object `live_debug.rs`'s
            wasm-only `poll_live_debug_toggles` reads every single frame)
            and the `liveMrrmEnabled`/`liveViewMode` getters it calls.
            Seeded once from query params so a shared `?mrrm=0`/
            `?stepheat=1` link still opens in the expected state.
         2. `reportPassTimings`/`reportStepData` -- unlike the getters
            above, `gpu_profile.rs`'s `report_pass_timings_to_js` and
            `step_data.rs`'s `report_step_data_to_js` gate *calling* these
            purely on `Config.gpu_profile_enabled` (`?gpuprofile=1` alone),
            independent of `?debug=1`. So `?gpuprofile=1` without
            `?debug=1` still drives real per-frame calls into these on the
            Rust side even though the visible overlay below is never built
            -- they default to safe no-ops here so that combination can
            never throw; the debug-gated overlay (below) overwrites them
            with the real panel-updating versions only when it actually
            exists. -->
  <script>
    (function setUpLiveDebugState() {
      const params = new URLSearchParams(location.search);
      window.mmLiveDebug = {
        mrrm: params.get("mrrm") !== "0", // absent/anything-but-"0" => on (default on)
        viewMode: params.get("stepheat") === "1" ? 1 : 0, // legacy ?stepheat=1 seeds FineStepHeat
      };
      // Polled every frame from Rust (`net.rs`'s `js_bridge`) -- getters,
      // not pushes, unlike `reportPassTimings`/`reportStepData` below,
      // since this is Rust pulling current JS state rather than JS pushing
      // a computed result to Rust.
      window.mmNet.liveMrrmEnabled = () => window.mmLiveDebug.mrrm;
      window.mmNet.liveViewMode = () => window.mmLiveDebug.viewMode;
    })();

    (function setUpGpuProfileBridgeDefaults() {
      // Safe no-ops: real implementations are installed by
      // `setUpGpuProfileOverlay` below, but only when `?debug=1` is also
      // present -- see the module doc above for why `?gpuprofile=1` alone
      // still needs these to exist.
      window.mmNet.reportPassTimings = function () {};
      window.mmNet.reportStepData = function () {};
    })();
  </script>
  <!-- Controls panel: a dat.gui instance that ALWAYS exists (every player
       gets it, regardless of `?debug=1`) because it's the only place the
       "copy invite link" row lives (moved here from the old always-on
       in-canvas "Share this link..." text + Bevy "Copy Link" button --
       `net.rs`'s `spawn_net_ui` doc) -- a real gameplay feature, not debug
       tooling, so it can never be hidden behind a debug flag.
       Everything else historically shown here -- the reload-triggering
       `Config::from_env` toggles (scene/shadowlod/perfprobe/vsync/
       res_oscillate/gpuprofile) and the live (no-reload) mrrm/view-mode
       toggles (`live_debug.rs`'s `LiveDebugToggles`) -- IS purely debug
       tooling a casual player has no use for, so those two folders are
       only added when `?debug=1` is present (`rust/app/src/config.rs`'s
       `Config::debug_enabled` convention, matching `fps_overlay.rs`'s own
       `?debug=1` gate for its top-left overlay). When `debug` isn't `"1"`
       the panel still exists (for the copy-link row) but shows nothing
       else -- effectively a single "copy invite link" button, not the
       full technical control surface. -->
  <script src="https://unpkg.com/dat.gui@0.7.9/build/dat.gui.min.js"></script>
  <script>
    (function setUpConfigPanel() {
      const params = new URLSearchParams(location.search);
      const debugEnabled = params.get("debug") === "1";

      // One entry per `Config::from_env` flag. `key`: the query-param name.
      // `type`: 'bool' (dat.gui checkbox) or 'enum' (dat.gui dropdown).
      // `parse`: query string -> current JS value, mirroring that flag's
      // exact default/encoding in config.rs. `serialize`: JS value -> query
      // string value to write back (only present where it differs from
      // `String(value)`, e.g. a bool that encodes as "0"/"1" rather than
      // "false"/"true"). `options`: dropdown choices for 'enum' fields
      // (`SceneKind::from_value`'s exact accepted strings, render.rs).
      //
      // `mrrm` and `stepheat` are NOT here: they're in the "Live Debug"
      // folder below instead (`live_debug.rs`'s `LiveDebugToggles`) since
      // debugging MRRM's coarse-warm-start behavior needs to flip these
      // mid-session without losing camera position. Every other flag stays
      // reload-based.
      const FIELDS = [
        {
          key: "scene",
          type: "enum",
          options: ["menger_oscillating_sphere", "demo", "classic_only", "menger_sponge", "menger_sphere"],
          parse: (v) => (v === null ? "menger_oscillating_sphere" : v),
        },
        {
          key: "shadowlod",
          type: "bool",
          parse: (v) => v !== "0", // default on
          serialize: (v) => (v ? "1" : "0"),
        },
        {
          key: "perfprobe",
          type: "bool",
          parse: (v) => v === "1" || v === "true", // default off
          serialize: (v) => (v ? "1" : "0"),
        },
        {
          key: "debug",
          type: "bool",
          parse: (v) => v === "1", // default off
          serialize: (v) => (v ? "1" : "0"),
        },
        {
          key: "vsync",
          type: "bool",
          // Config's own field is `vsync_off` (true means vsync is OFF), but
          // the panel shows the checkbox as "vsync" (checked = vsync ON, the
          // default) so its polarity matches every other checkbox here
          // (checked = feature enabled) instead of a double-negative.
          parse: (v) => v !== "off",
          serialize: (v) => (v ? "on" : "off"), // any non-"off" value falls back to AutoVsync (main.rs's present_mode), "on" is just the readable choice
        },
        {
          key: "res_oscillate",
          type: "bool",
          parse: (v) => v === "1", // default off
          serialize: (v) => (v ? "1" : "0"),
        },
        {
          key: "gpuprofile",
          type: "bool",
          parse: (v) => v === "1", // default off
          serialize: (v) => (v ? "1" : "0"),
        },
      ];

      const state = {};
      for (const field of FIELDS) {
        state[field.key] = field.parse(params.get(field.key));
      }

      function applyChange() {
        const next = new URLSearchParams(location.search);
        for (const field of FIELDS) {
          const value = state[field.key];
          const serialized = field.serialize ? field.serialize(value) : String(value);
          next.set(field.key, serialized);
        }
        // Assigning `location.search` navigates on its own (confirmed) --
        // no separate `location.reload()` call needed.
        location.search = next.toString();
      }

      // `autoPlace: false` + our own `#config-gui` container (styled in the
      // <head>): dat.gui's auto-placed container is fixed top-right with its
      // own inline sizing, and an earlier approach of restyling
      // `gui.domElement` *inside* that container rendered mispositioned and
      // bottom-clipped on phones (the last rows and close button off-screen).
      // Owning the container makes the position/max-height/scroll behavior
      // one plain CSS rule instead of a fight with dat.gui's internals.
      const gui = new dat.GUI({ autoPlace: false });
      const guiContainer = document.createElement("div");
      guiContainer.id = "config-gui";
      guiContainer.appendChild(gui.domElement);
      document.body.appendChild(guiContainer);
      // Phones: start collapsed so the panel doesn't dominate a small
      // screen at load -- one tap on "Open Controls" brings it back.
      // Desktop keeps it open, matching previous behavior.
      if (window.innerWidth < 700) {
        gui.close();
      }

      // Copy-invite-link -- always present regardless of `?debug=1` (module
      // doc above): the invite URL is plain JS state (`mmNet.hostedId()`),
      // so the controls panel can own the whole flow -- build the link,
      // write the clipboard (synchronously inside the click handler, the
      // same user-gesture requirement net.js's copyToClipboard documents),
      // and show transient feedback by renaming the row.
      const COPY_IDLE_LABEL = "copy invite link";
      const copyState = {
        copy: function () {
          const id = window.mmNet.hostedId();
          if (!id) {
            showCopyFeedback("link not ready yet...");
            return;
          }
          const link = `${location.origin}${location.pathname}?join=${id}`;
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(link).then(
              () => showCopyFeedback("copied!"),
              () => showCopyFeedback("copy failed"),
            );
          } else {
            showCopyFeedback("copy failed");
          }
        },
      };
      const copyController = gui.add(copyState, "copy").name(COPY_IDLE_LABEL);
      let copyFeedbackTimeout = null;
      function showCopyFeedback(message) {
        copyController.name(message);
        if (copyFeedbackTimeout !== null) clearTimeout(copyFeedbackTimeout);
        copyFeedbackTimeout = setTimeout(() => {
          copyController.name(COPY_IDLE_LABEL);
          copyFeedbackTimeout = null;
        }, 1500);
      }

      // Everything past this point is debug-only tooling (module doc
      // above) -- skip entirely when `?debug=1` isn't set, so a casual
      // player's panel is just the copy-link row above.
      if (!debugEnabled) {
        return;
      }

      // Two folders so reload-triggering and instant/live controls are
      // visually distinguishable at a glance, instead of one flat list a
      // user has to click into to discover which kind each row is.
      const reloadFolder = gui.addFolder("Scene & Render (reload)");
      for (const field of FIELDS) {
        const controller =
          field.type === "enum"
            ? reloadFolder.add(state, field.key, field.options)
            : reloadFolder.add(state, field.key);
        controller.onFinishChange(applyChange);
      }
      reloadFolder.open();

      // Live (no-reload) debug toggles (`live_debug.rs`'s
      // `LiveDebugToggles`), deliberately with no `onFinishChange`/
      // `applyChange` wiring: `window.mmLiveDebug` is a plain object
      // dat.gui mutates in place, polled fresh every frame by Rust
      // (`net.rs`'s `js_bridge::live_mrrm_enabled`/`live_view_mode`,
      // wired unconditionally in `setUpLiveDebugState` above), so a
      // change here takes effect on the very next frame with no
      // navigation at all.
      const liveFolder = gui.addFolder("Live Debug (instant)");
      // Object-mapped dropdown (dat.gui's `gui.add(obj, key, {label:
      // value})` form): values are `live_debug.rs`'s
      // `DebugViewMode::as_uniform_value` wire encoding exactly (0..=3)
      // -- keep in sync if that enum grows.
      const VIEW_MODE_OPTIONS = {
        Off: 0,
        "Fine step heat": 1,
        "Coarse step heat": 2,
        "Coarse step distance": 3,
      };
      liveFolder.add(window.mmLiveDebug, "mrrm").name("mrrm (live)");
      liveFolder.add(window.mmLiveDebug, "viewMode", VIEW_MODE_OPTIONS).name("view mode (live)");
      liveFolder.open();
    })();
  </script>
  <!-- GPU per-pass timestamp profiling overlay (gpu_profile.rs). Built only
       when BOTH `?debug=1` AND `?gpuprofile=1` hold -- `?debug=1` is the
       single consistent master switch for every developer-facing UI
       element in this file; `?gpuprofile=1` alone no longer shows this
       panel (previously it did on its own). Overwrites the safe no-op
       `window.mmNet.reportPassTimings`/`reportStepData` installed
       unconditionally above with the real panel-updating versions --
       Rust's own gate for *calling* these (`Config.gpu_profile_enabled`,
       `gpu_profile.rs`/`step_data.rs`) is `?gpuprofile=1` alone,
       independent of `?debug=1`, so this panel existing or not is purely
       about whether anyone's watching the numbers, never about whether
       Rust is allowed to report them. Positioned bottom-left (styled in
       the <head>, `#gpu-profile-overlay`, to read as part of the same
       developer HUD as the dat.gui panel bottom-right): top-left is the
       Bevy-UI debug overlay (fps_overlay.rs, `?debug=1`), top-right is the
       networking status panel (net.rs's spawn_net_ui -- hidden except on
       connect/disconnect/error events) -- all four corners used, no
       overlap. -->
  <script>
    (function setUpGpuProfileOverlay() {
      const params = new URLSearchParams(location.search);
      if (params.get("debug") !== "1" || params.get("gpuprofile") !== "1") return;

      const panel = document.createElement("pre");
      panel.id = "gpu-profile-overlay";
      document.body.appendChild(panel);

      // `ms < 0` is the "no reading yet" sentinel (net.rs's js_bridge doc) --
      // distinct from `supported === false`, which means this adapter will
      // never produce real numbers here at all.
      const fmt = (ms) => (ms < 0 ? "  --  " : ms.toFixed(2).padStart(6) + "ms");

      // Cumulative ray-march step-count estimate (`step_data.rs`) -- a
      // separate `reportStepData` call, independent of `reportPassTimings`
      // above (both gate on the same `?debug=1&gpuprofile=1` flags on the
      // Rust side, but neither depends on the other having landed first,
      // so this panel tracks each one's own "no reading yet" state
      // separately rather than assuming they arrive together).
      let lastTimingsLine = "GPU pass timings: waiting for first frame...";
      let lastStepDataLine = "step count: waiting for first frame...";
      const render = () => {
        panel.textContent = `${lastTimingsLine}\n${lastStepDataLine}`;
      };
      render();

      window.mmNet.reportPassTimings = function (supported, coarseMs, shadowMs, fineMs, presentMs) {
        if (!supported) {
          lastTimingsLine = "GPU pass timings: unsupported on this backend (no wgpu::Features::TIMESTAMP_QUERY)";
        } else {
          lastTimingsLine =
            "GPU pass timings\n" +
            `  coarse:  ${fmt(coarseMs)}\n` +
            `  shadow:  ${fmt(shadowMs)}\n` +
            `  fine:    ${fmt(fineMs)}\n` +
            `  present: ${fmt(presentMs)}`;
        }
        render();
      };

      window.mmNet.reportStepData = function (avgItersPerPx, estimatedTotalSteps) {
        lastStepDataLine =
          avgItersPerPx < 0
            ? "step count: waiting for first frame..."
            : `est. total steps: ${Math.round(estimatedTotalSteps).toLocaleString()}  (avg ${avgItersPerPx.toFixed(1)}/px)`;
        render();
      };
    })();
  </script>
  <script type="module">
    import init from "./marble-marcher.js";
    init().catch((e) => {
      document.title = "INIT FAILED";
      console.error(e);
    });
  </script>
</body>
</html>
